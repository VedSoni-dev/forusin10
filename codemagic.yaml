# Codemagic CI is the build pipeline for this app.
# It builds installers on cloud macOS and Windows machines and publishes them to
# GitHub Releases, which also powers the auto-update feed.
#
# One-time setup in Codemagic:
#   GH_TOKEN = GitHub personal access token with repo scope, marked Secret.
#              electron-builder uses it to upload installers and update manifests.
#
# electron-builder creates or updates a draft GitHub Release for the current
# version. Run the macOS and Windows jobs, then publish the draft on GitHub.
workflows:
  macos:
    name: macOS build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      vars:
        # Unsigned for now. Mac users open via right-click > Open the first time,
        # and Mac auto-update stays off until an Apple Developer cert is added.
        CSC_IDENTITY_AUTO_DISCOVERY: "false"
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build renderer
        script: npm run build
      - name: Download Ollama binary (bundled into the app)
        script: node scripts/download-ollama.mjs
      - name: Build and publish macOS app to GitHub Releases
        script: npx electron-builder --mac dmg zip --publish always
    artifacts:
      - dist-app/*.dmg
      - dist-app/*.zip
      - dist-app/latest-mac.yml
      - dist-app/*.blockmap

  windows:
    name: Windows build
    instance_type: windows_x2
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build renderer
        script: npm run build
      - name: Download Ollama binary (bundled into the app)
        script: node scripts/download-ollama.mjs
      - name: Build and publish Windows installer to GitHub Releases
        # Unsigned: the installer shows a SmartScreen warning until signing is added.
        script: npx electron-builder --win nsis --publish always
    artifacts:
      - dist-app/*.exe
      - dist-app/latest.yml
      - dist-app/*.blockmap
