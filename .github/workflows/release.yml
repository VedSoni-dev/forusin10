name: Release

# Cut a release by pushing a version tag, e.g.:
#   npm version patch   (bumps package.json + creates a git tag)
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to publish the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build & publish app
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
